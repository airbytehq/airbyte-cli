version: 2

project_name: airbyte-agents

before:
  hooks:
    - go mod tidy

builds:
  - id: airbyte-agents
    main: .
    binary: airbyte-agents
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/airbytehq/airbyte-agents-cli/cmd.Version={{.Version}}
      - -X github.com/airbytehq/airbyte-agents-cli/cmd.Commit={{.Commit}}
      - -X github.com/airbytehq/airbyte-agents-cli/cmd.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - AGENTS.md
      - CONTEXT.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  draft: true
  prerelease: auto
  name_template: "v{{ .Version }}"

# Homebrew formula generation. Goreleaser opens a PR against airbytehq/homebrew-tap
# updating Formula/airbyte-agents.rb on each non-prerelease release. main is
# branch-protected on the tap, so direct commits 409 — the PR flow is the
# supported path. Cross-repo write requires a separate token
# (HOMEBREW_TAP_GITHUB_TOKEN) — the default GITHUB_TOKEN issued by the workflow
# only has access to this repo.
brews:
  - name: airbyte-agents
    repository:
      owner: airbytehq
      name: homebrew-tap
      branch: bump-airbyte-agents-{{ .Version }}
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          branch: main
    directory: Formula
    homepage: https://github.com/airbytehq/airbyte-agents-cli
    description: Go CLI for the Airbyte API, designed for both humans and AI agents
    license: MIT
    install: |
      bin.install "airbyte-agents"
    test: |
      system "#{bin}/airbyte-agents", "version"
    skip_upload: auto # don't update the formula for prereleases (e.g. v0.1.0-rc1)
